<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz CSS - Flores Animadas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; }
        body { background: linear-gradient(135deg, #6ecbf5 0%, #059ee3 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        .start-screen { background-color: #ff9e6d; border-radius: 30px; padding: 50px 40px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 10px solid #ff7b3d; position: relative; overflow: hidden; }
        .start-screen::before { content: ""; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background-color: #ffda79; border-radius: 50%; z-index: 1; }
        .start-screen::after { content: ""; position: absolute; bottom: -30px; left: -30px; width: 100px; height: 100px; background-color: #a5deff; border-radius: 50%; z-index: 1; }
        .start-title { font-size: 3.5rem; color: white; margin-bottom: 20px; text-shadow: 4px 4px 0 #ff7b3d; position: relative; z-index: 2; }
        .start-subtitle { font-size: 1.8rem; color: white; margin-bottom: 40px; text-shadow: 2px 2px 0 #ff7b3d; position: relative; z-index: 2; }
        .character { width: 150px; height: 150px; margin: 0 auto 40px; background-color: #ffda79; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 8px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); position: relative; z-index: 2; }
        .character i { font-size: 70px; color: #ff7b3d; }
        .btn-start { background-color: #4cd964; color: white; border: none; border-radius: 50px; padding: 25px 60px; font-size: 2rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 0 #2ecc71; position: relative; z-index: 2; letter-spacing: 2px; }
        .btn-start:hover { transform: translateY(-5px); box-shadow: 0 15px 0 #2ecc71; background-color: #5de673; }
        .btn-start:active { transform: translateY(0); box-shadow: 0 5px 0 #2ecc71; }
        .game-screen { display: none; background-color: white; border-radius: 30px; padding: 40px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 10px solid #a5deff; position: relative; overflow: hidden; }
        .game-screen::before { content: ""; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; background-color: #ffda79; border-radius: 50%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background-color: #a5deff; padding: 20px; border-radius: 20px; border: 5px solid #6ecbf5; }
        .score-container { background-color: white; padding: 15px 25px; border-radius: 15px; border: 5px solid #4cd964; text-align: center; min-width: 150px; }
        .score-label { font-size: 1.2rem; color: #666; margin-bottom: 5px; }
        .score-value { font-size: 2.5rem; font-weight: bold; color: #ff7b3d; }
        .question-counter { background-color: white; padding: 15px 25px; border-radius: 15px; border: 5px solid #ffda79; text-align: center; min-width: 150px; }
        .counter-label { font-size: 1.2rem; color: #666; margin-bottom: 5px; }
        .counter-value { font-size: 2.5rem; font-weight: bold; color: #6ecbf5; }
        .question-card { background-color: #ffda79; border-radius: 25px; padding: 40px; margin-bottom: 40px; border: 8px solid #ffb347; position: relative; box-shadow: 0 10px 20px rgba(255,179,71,0.3); }
        .question-number { position: absolute; top: -20px; left: 30px; background-color: #ff7b3d; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; border: 5px solid white; box-shadow: 0 5px 15px rgba(255,123,61,0.4); }
        .question-text { font-size: 2.2rem; color: #333; line-height: 1.4; text-align: center; padding-top: 10px; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 40px; }
        .option { background: linear-gradient(145deg, #ffffff, #f0f0f0); border-radius: 25px; padding: 30px 20px; font-size: 1.8rem; color: #333; cursor: pointer; transition: all 0.4s ease; text-align: center; min-height: 140px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1); border: 5px solid transparent; }
        .option::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 10px; background: linear-gradient(90deg, #ff7b3d, #ffda79); transform: translateY(-100%); transition: transform 0.3s ease; }
        .option:hover { transform: translateY(-10px) scale(1.03); box-shadow: 0 15px 25px rgba(0,0,0,0.15); border-color: #6ecbf5; }
        .option:hover::before { transform: translateY(0); }
        .option-icon { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; color: #6ecbf5; opacity: 0.5; }
        .option.selected { border-color: #ff7b3d; background: linear-gradient(145deg, #fff5e6, #ffeacc); animation: pulse 0.5s ease; }
        .option.correct { border-color: #4cd964; background: linear-gradient(145deg, #e6ffe6, #ccffcc); animation: correctAnimation 1s ease; }
        .option.correct::after { content: "✓"; position: absolute; top: -15px; right: -15px; width: 50px; height: 50px; background-color: #4cd964; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; animation: popIn 0.5s ease 0.3s both; }
        .option.incorrect { border-color: #ff6b6b; background: linear-gradient(145deg, #ffe6e6, #ffcccc); animation: shake 0.5s ease; }
        .option.incorrect::after { content: "✗"; position: absolute; top: -15px; right: -15px; width: 50px; height: 50px; background-color: #ff6b6b; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; animation: popIn 0.5s ease 0.3s both; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes correctAnimation { 0% { transform: scale(1); } 25% { transform: scale(1.1); } 50% { transform: scale(1); } 75% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .loading-content { background-color: white; border-radius: 25px; padding: 40px; text-align: center; max-width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); animation: slideUp 0.5s ease; }
        .loading-spinner { width: 80px; height: 80px; border: 8px solid #f3f3f3; border-top: 8px solid #4cd964; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 30px; }
        .loading-text { font-size: 2rem; color: #333; font-weight: bold; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .feedback-container { background: linear-gradient(145deg, #e8f6ff, #d6eeff); border-radius: 25px; padding: 30px; margin-bottom: 40px; border: 8px solid #6ecbf5; display: none; box-shadow: 0 10px 20px rgba(108,203,245,0.3); animation: slideIn 0.5s ease; }
        @keyframes slideIn { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .feedback-title { display: flex; align-items: center; margin-bottom: 20px; }
        .feedback-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 20px; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .feedback-icon.correct { background: linear-gradient(145deg, #4cd964, #3ac853); }
        .feedback-icon.incorrect { background: linear-gradient(145deg, #ff6b6b, #e55a5a); }
        .feedback-icon i { font-size: 2.5rem; color: white; }
        .feedback-text { font-size: 1.8rem; color: #333; line-height: 1.5; }
        .controls { display: flex; justify-content: center; }
        .btn-next { background: linear-gradient(145deg, #ff7b3d, #ff8f57); color: white; border: none; border-radius: 50px; padding: 25px 60px; font-size: 2rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 0 #e55a1e; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .btn-next::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.5s ease; }
        .btn-next:hover { transform: translateY(-5px); box-shadow: 0 15px 0 #e55a1e; }
        .btn-next:hover::before { left: 100%; }
        .btn-next:active { transform: translateY(0); box-shadow: 0 5px 0 #e55a1e; }
        .btn-next i { margin-left: 15px; }
        .end-screen { display: none; background: linear-gradient(145deg, #ffda79, #ffb347); border-radius: 30px; padding: 50px 40px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 10px solid #ffb347; position: relative; overflow: hidden; }
        .end-screen::before { content: ""; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background-color: #a5deff; border-radius: 50%; }
        .end-title { font-size: 3.5rem; color: #ff7b3d; margin-bottom: 30px; text-shadow: 4px 4px 0 white; position: relative; z-index: 2; }
        .final-score { font-size: 5rem; color: #6ecbf5; margin-bottom: 30px; text-shadow: 4px 4px 0 white; position: relative; z-index: 2; }
        .score-message { font-size: 2.2rem; color: #333; margin-bottom: 50px; position: relative; z-index: 2; }
        .btn-restart { background: linear-gradient(145deg, #4cd964, #5de673); color: white; border: none; border-radius: 50px; padding: 25px 60px; font-size: 2rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 0 #2ecc71; position: relative; z-index: 2; }
        .btn-restart:hover { transform: translateY(-5px); box-shadow: 0 15px 0 #2ecc71; }
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 9999; pointer-events: none; }
        @keyframes confetti-fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        @media (max-width: 768px) { .options-container { grid-template-columns: 1fr; } .question-text { font-size: 1.8rem; } .option { font-size: 1.6rem; min-height: 120px; } .start-title, .end-title { font-size: 2.8rem; } .header { flex-direction: column; gap: 20px; } .score-container, .question-counter { width: 100%; } }
        @media (max-width: 480px) { .start-title, .end-title { font-size: 2.2rem; } .question-text { font-size: 1.6rem; } .option { font-size: 1.4rem; padding: 20px 10px; min-height: 100px; } .btn-start, .btn-next, .btn-restart { font-size: 1.6rem; padding: 20px 40px; } .feedback-text { font-size: 1.5rem; } .loading-content { padding: 30px 20px; margin: 20px; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loading-text">Comprobando respuesta...</div>
        </div>
    </div>
    
    <div class="container">
        <div class="start-screen" id="start-screen">
            <h1 class="start-title">🌻 Quiz CSS - Flores Animadas 🌻</h1>
            <p class="start-subtitle">¡Pon a prueba tus conocimientos del CSS de las flores!</p>
            <div class="character"><i class="fas fa-seedling"></i></div>
            <button class="btn-start" id="btn-start"><i class="fas fa-play-circle"></i> ¡EMPEZAR!</button>
        </div>
        
        <div class="game-screen" id="game-screen">
            <div class="header">
                <div class="score-container">
                    <div class="score-label">PUNTUACIÓN</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="question-counter">
                    <div class="counter-label">PREGUNTA</div>
                    <div class="counter-value" id="question-counter">1/10</div>
                </div>
            </div>
            <div class="question-card">
                <div class="question-number" id="question-number">1</div>
                <div class="question-text" id="question-text">Cargando pregunta...</div>
            </div>
            <div class="options-container" id="options-container"></div>
            <div class="feedback-container" id="feedback-container">
                <div class="feedback-title">
                    <div class="feedback-icon" id="feedback-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="feedback-text" id="feedback-text"></div>
                </div>
            </div>
            <div class="controls">
                <button class="btn-next" id="btn-next">Siguiente <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>
        
        <div class="end-screen" id="end-screen">
            <h1 class="end-title">¡Juego Terminado!</h1>
            <div class="final-score" id="final-score">0/10</div>
            <p class="score-message" id="score-message">¡Excelente trabajo!</p>
            <button class="btn-restart" id="btn-restart"><i class="fas fa-redo"></i> Jugar de nuevo</button>
        </div>
    </div>

    <script>
        let score = 0;
        let currentQuestionIndex = 0;
        let selectedOption = null;
        
        const questions = [
            {
                question: "¿Para qué sirve una variable en CSS?",
                options: [
                    "Para animar un elemento automáticamente",
                    "Para guardar un valor y reutilizarlo en muchos lugares con var()",
                    "Para cambiar el color del fondo de la página",
                    "Para definir el tamaño de la fuente del texto"
                ],
                correct: 1,
                explanation: "¡Correcto! 🌿 Una variable CSS guarda un valor (como un número, color o tamaño) y te deja usarlo en cualquier parte con var(--nombre). Si cambias la variable, todos los lugares donde se usa se actualizan solos."
            },
            {
                question: "¿Para qué sirve width en CSS?",
                options: [
                    "Para definir el alto del elemento",
                    "Para definir el ancho del elemento",
                    "Para mover el elemento hacia los lados",
                    "Para cambiar el grosor del borde"
                ],
                correct: 1,
                explanation: "¡Muy bien! 📏 width define el ancho de un elemento. Puedes usar píxeles, porcentajes, vmin, etc. En el código de las flores se usa para definir el ancho de cada hoja."
            },
            {
                question: "¿Para qué sirve height en CSS?",
                options: [
                    "Para definir el ancho del elemento",
                    "Para ocultar el elemento de la pantalla",
                    "Para definir la altura del elemento",
                    "Para alinear el elemento verticalmente"
                ],
                correct: 2,
                explanation: "¡Perfecto! 📐 height define la altura de un elemento. En el código de las flores se usa tanto para el tallo (height: 70vmin) como para las hojas, calculando su altura con calc() a partir del ancho."
            },
            {
                question: "¿Para qué sirve position: absolute en CSS?",
                options: [
                    "Para centrar el elemento en la pantalla",
                    "Para sacar el elemento del flujo normal y posicionarlo con top, left, right o bottom",
                    "Para fijar el elemento y que no se mueva al hacer scroll",
                    "Para hacer que el elemento ocupe todo el ancho disponible"
                ],
                correct: 1,
                explanation: "¡Excelente! 📌 position: absolute saca al elemento del flujo normal de la página. Luego puedes usar top, left, right o bottom para colocarlo exactamente donde quieras dentro de su contenedor. Así se posicionan las hojas sobre el tallo."
            },
            {
                question: "¿Para qué sirve transform: rotate() en CSS?",
                options: [
                    "Para mover el elemento hacia arriba o abajo",
                    "Para girar el elemento los grados que le indiques",
                    "Para cambiar el tamaño del elemento",
                    "Para voltear el elemento como un espejo"
                ],
                correct: 1,
                explanation: "¡Correcto! 🔄 rotate() gira el elemento los grados que le pongas. Positivo gira a la derecha, negativo gira a la izquierda. En las flores se usa para inclinar las hojas y que queden en diagonal a los lados del tallo."
            },
            {
                question: "¿Para qué sirve transform: scale() en CSS?",
                options: [
                    "Para rotar el elemento en 3D",
                    "Para mover el elemento a escala de grises",
                    "Para agrandar o achicar el elemento",
                    "Para cambiar la transparencia del elemento"
                ],
                correct: 2,
                explanation: "¡Brillante! 🔍 scale() agranda o achica el elemento. scale(0) lo hace invisible, scale(1) es su tamaño normal, scale(2) lo duplica. En las animaciones de las hojas empieza en scale(0) y crece hasta scale(1), creando el efecto de florecimiento."
            },
            {
                question: "¿Para qué sirve border-radius en CSS?",
                options: [
                    "Para agregar un borde de color al elemento",
                    "Para redondear las esquinas del elemento",
                    "Para definir el grosor del borde",
                    "Para hacer el borde punteado o discontinuo"
                ],
                correct: 1,
                explanation: "¡Muy bien! 🌿 border-radius redondea las esquinas. En las flores se aplica solo a 2 esquinas opuestas de cada hoja (por ejemplo border-top-right-radius y border-bottom-left-radius), lo que transforma un rectángulo en una forma de hoja."
            },
            {
                question: "¿Para qué sirve animation en CSS?",
                options: [
                    "Para cambiar el color de un elemento al hacer clic",
                    "Para aplicar una animación definida con @keyframes a un elemento",
                    "Para hacer que el elemento aparezca al cargar la página",
                    "Para agregar efectos de sonido al elemento"
                ],
                correct: 1,
                explanation: "¡Perfecto! 🎬 La propiedad animation conecta un elemento con una animación creada en @keyframes. También controla la duración, el delay y cuántas veces se repite. En las flores anima tanto el crecimiento del tallo como el florecimiento de cada hoja."
            },
            {
                question: "¿Para qué sirve background-image: linear-gradient() en CSS?",
                options: [
                    "Para poner una imagen descargada de internet como fondo",
                    "Para crear un fondo con degradado que va de un color a otro",
                    "Para repetir un color en forma de líneas",
                    "Para hacer el fondo transparente con colores"
                ],
                correct: 1,
                explanation: "¡Excelente! 🎨 linear-gradient crea un degradado de colores como fondo. Puedes elegir la dirección (to top, to left) y los colores. En el tallo se usan dos gradientes apilados: uno da el color verde y el otro agrega sombra lateral para dar volumen."
            },
            {
                question: "¿Para qué sirve @keyframes en CSS?",
                options: [
                    "Para definir los estilos que tendrá un elemento en cada momento de una animación",
                    "Para importar animaciones de otras páginas web",
                    "Para controlar la velocidad del scroll de la página",
                    "Para guardar configuraciones de animación para usarlas después"
                ],
                correct: 0,
                explanation: "¡Correcto! 🎞️ @keyframes define paso a paso cómo cambia un elemento durante la animación. Puedes indicar el estado al 0% (inicio), al 100% (final) o en cualquier punto intermedio. En las flores define cómo crecen el tallo y las hojas desde cero."
            }
        ];
        
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const btnStart = document.getElementById('btn-start');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');
        const scoreElement = document.getElementById('score');
        const questionCounterElement = document.getElementById('question-counter');
        const questionNumberElement = document.getElementById('question-number');
        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackText = document.getElementById('feedback-text');
        const finalScoreElement = document.getElementById('final-score');
        const scoreMessageElement = document.getElementById('score-message');
        
        btnStart.addEventListener('click', startGame);
        btnNext.addEventListener('click', nextQuestion);
        btnRestart.addEventListener('click', restartGame);
        
        function startGame() {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            loadQuestion();
        }
        
        function loadQuestion() {
            resetQuestion();
            const q = questions[currentQuestionIndex];
            questionTextElement.textContent = q.question;
            questionNumberElement.textContent = currentQuestionIndex + 1;
            questionCounterElement.textContent = `${currentQuestionIndex + 1}/${questions.length}`;
            optionsContainer.innerHTML = '';

            const shuffled = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            const icons = ['fas fa-leaf', 'fas fa-seedling', 'fas fa-sun', 'fas fa-spa'];
            shuffled.forEach((option, index) => {
                const el = document.createElement('div');
                el.classList.add('option');
                el.dataset.correct = option.isCorrect;
                el.innerHTML = `<div class="option-icon"><i class="${icons[index]}"></i></div><div>${option.text}</div>`;
                el.addEventListener('click', () => selectOption(option.isCorrect, el));
                optionsContainer.appendChild(el);
            });
            
            feedbackContainer.style.display = 'none';
            btnNext.disabled = true;
        }
        
        function selectOption(isCorrect, optionElement) {
            if (selectedOption !== null) return;
            selectedOption = optionElement;
            optionElement.classList.add('selected');
            document.querySelectorAll('.option').forEach(opt => opt.style.pointerEvents = 'none');
            showLoading();
            setTimeout(() => checkAnswer(isCorrect, optionElement), 1500);
        }
        
        function showLoading() {
            const msgs = ["Comprobando respuesta...", "Analizando tu elección...", "¡Un momento por favor!", "Procesando información..."];
            loadingText.textContent = msgs[Math.floor(Math.random() * msgs.length)];
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() { loadingOverlay.classList.remove('active'); }
        
        function createConfetti() {
            const colors = ['#FF6B9D', '#FEC163', '#6BCF7F', '#4D96FF', '#9B59B6', '#FFD93D', '#ff7b3d'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.cssText = `left:${Math.random()*100}%;top:-10px;background-color:${colors[Math.floor(Math.random()*colors.length)]};animation:confetti-fall ${2+Math.random()*2}s linear forwards;animation-delay:${Math.random()*0.3}s`;
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 20);
            }
        }
        
        function checkAnswer(isCorrect, optionElement) {
            hideLoading();
            document.querySelectorAll('.option').forEach(opt => {
                if (opt.dataset.correct === 'true') opt.classList.add('correct');
                else if (opt === optionElement && !isCorrect) opt.classList.add('incorrect');
            });
            if (isCorrect) { score++; scoreElement.textContent = score; createConfetti(); }
            setTimeout(() => showFeedback(isCorrect), 300);
            setTimeout(() => btnNext.disabled = false, 500);
        }
        
        function showFeedback(isCorrect) {
            const q = questions[currentQuestionIndex];
            if (isCorrect) {
                feedbackIcon.className = 'feedback-icon correct';
                feedbackIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
                feedbackText.textContent = q.explanation;
            } else {
                feedbackIcon.className = 'feedback-icon incorrect';
                feedbackIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                feedbackText.textContent = `¡Buen intento! 💪 La respuesta correcta era: "${q.options[q.correct]}". ${q.explanation}`;
            }
            feedbackContainer.style.display = 'block';
        }
        
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) loadQuestion();
            else endGame();
        }
        
        function endGame() {
            gameScreen.style.display = 'none';
            endScreen.style.display = 'block';
            finalScoreElement.textContent = `${score}/${questions.length}`;
            if (score === questions.length) { scoreMessageElement.textContent = "¡PERFECTO! 🏆 ¡Eres un experto en CSS de flores!"; createConfetti(); }
            else if (score >= questions.length * 0.7) scoreMessageElement.textContent = "¡MUY BIEN! 🌟 Dominas el CSS de flores muy bien";
            else if (score >= questions.length * 0.5) scoreMessageElement.textContent = "¡BUEN TRABAJO! 👍 Sigue aprendiendo CSS";
            else scoreMessageElement.textContent = "¡SIGUE PRACTICANDO! 💪 ¡Tú puedes con el CSS!";
        }
        
        function restartGame() {
            score = 0; currentQuestionIndex = 0; selectedOption = null;
            scoreElement.textContent = score;
            endScreen.style.display = 'none';
            startScreen.style.display = 'block';
        }
        
        function resetQuestion() { selectedOption = null; }
    </script>
</body>
</html>

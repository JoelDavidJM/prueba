<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Aventura para Niños</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
        }
        
        body {
            background: linear-gradient(135deg, #6ecbf5 0%, #059ee3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* Pantalla de inicio */
        .start-screen {
            background-color: #ff9e6d;
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border: 10px solid #ff7b3d;
            position: relative;
            overflow: hidden;
        }
        
        .start-screen::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background-color: #ffda79;
            border-radius: 50%;
            z-index: 1;
        }
        
        .start-screen::after {
            content: "";
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background-color: #a5deff;
            border-radius: 50%;
            z-index: 1;
        }
        
        .start-title {
            font-size: 3.5rem;
            color: white;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #ff7b3d;
            position: relative;
            z-index: 2;
        }
        
        .start-subtitle {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0 #ff7b3d;
            position: relative;
            z-index: 2;
        }
        
        .character {
            width: 150px;
            height: 150px;
            margin: 0 auto 40px;
            background-color: #ffda79;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 2;
        }
        
        .character i {
            font-size: 70px;
            color: #ff7b3d;
        }
        
        .btn-start {
            background-color: #4cd964;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 0 #2ecc71;
            position: relative;
            z-index: 2;
            letter-spacing: 2px;
        }
        
        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #2ecc71;
            background-color: #5de673;
        }
        
        .btn-start:active {
            transform: translateY(0);
            box-shadow: 0 5px 0 #2ecc71;
        }
        
        /* Juego */
        .game-screen {
            display: none;
            background-color: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border: 10px solid #a5deff;
            position: relative;
            overflow: hidden;
        }
        
        .game-screen::before {
            content: "";
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background-color: #ffda79;
            border-radius: 50%;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background-color: #a5deff;
            padding: 20px;
            border-radius: 20px;
            border: 5px solid #6ecbf5;
        }
        
        .score-container {
            background-color: white;
            padding: 15px 25px;
            border-radius: 15px;
            border: 5px solid #4cd964;
            text-align: center;
            min-width: 150px;
        }
        
        .score-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .score-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff7b3d;
        }
        
        .question-counter {
            background-color: white;
            padding: 15px 25px;
            border-radius: 15px;
            border: 5px solid #ffda79;
            text-align: center;
            min-width: 150px;
        }
        
        .counter-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .counter-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #6ecbf5;
        }
        
        .question-card {
            background-color: #ffda79;
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 40px;
            border: 8px solid #ffb347;
            position: relative;
            box-shadow: 0 10px 20px rgba(255, 179, 71, 0.3);
        }
        
        .question-number {
            position: absolute;
            top: -20px;
            left: 30px;
            background-color: #ff7b3d;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(255, 123, 61, 0.4);
        }
        
        .question-text {
            font-size: 2.2rem;
            color: #333;
            line-height: 1.4;
            text-align: center;
            padding-top: 10px;
        }
        
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }
        
        /* Tarjetas de opciones mejoradas */
        .option {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border-radius: 25px;
            padding: 30px 20px;
            font-size: 1.8rem;
            color: #333;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            border: 5px solid transparent;
        }
        
        .option::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, #ff7b3d, #ffda79);
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }
        
        .option:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
            border-color: #6ecbf5;
        }
        
        .option:hover::before {
            transform: translateY(0);
        }
        
        .option-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: #6ecbf5;
            opacity: 0.5;
        }
        
        /* Estilos para opciones seleccionadas, correctas e incorrectas */
        .option.selected {
            border-color: #ff7b3d;
            background: linear-gradient(145deg, #fff5e6, #ffeacc);
            animation: pulse 0.5s ease;
        }
        
        .option.correct {
            border-color: #4cd964;
            background: linear-gradient(145deg, #e6ffe6, #ccffcc);
            animation: correctAnimation 1s ease;
            position: relative;
            overflow: hidden;
        }
        
        .option.correct::after {
            content: "✓";
            position: absolute;
            top: -15px;
            right: -15px;
            width: 50px;
            height: 50px;
            background-color: #4cd964;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            animation: popIn 0.5s ease 0.3s both;
        }
        
        .option.incorrect {
            border-color: #ff6b6b;
            background: linear-gradient(145deg, #ffe6e6, #ffcccc);
            animation: shake 0.5s ease;
        }
        
        .option.incorrect::after {
            content: "✗";
            position: absolute;
            top: -15px;
            right: -15px;
            width: 50px;
            height: 50px;
            background-color: #ff6b6b;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            animation: popIn 0.5s ease 0.3s both;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes correctAnimation {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        /* Animación de carga */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .loading-content {
            background-color: white;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #4cd964;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        .loading-text {
            font-size: 2rem;
            color: #333;
            font-weight: bold;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        /* Feedback container */
        .feedback-container {
            background: linear-gradient(145deg, #e8f6ff, #d6eeff);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            border: 8px solid #6ecbf5;
            display: none;
            box-shadow: 0 10px 20px rgba(108, 203, 245, 0.3);
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .feedback-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .feedback-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .feedback-icon.correct {
            background: linear-gradient(145deg, #4cd964, #3ac853);
        }
        
        .feedback-icon.incorrect {
            background: linear-gradient(145deg, #ff6b6b, #e55a5a);
        }
        
        .feedback-icon i {
            font-size: 2.5rem;
            color: white;
        }
        
        .feedback-text {
            font-size: 1.8rem;
            color: #333;
            line-height: 1.5;
        }
        
        .controls {
            display: flex;
            justify-content: center;
        }
        
        .btn-next {
            background: linear-gradient(145deg, #ff7b3d, #ff8f57);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 0 #e55a1e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .btn-next::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-next:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #e55a1e;
        }
        
        .btn-next:hover::before {
            left: 100%;
        }
        
        .btn-next:active {
            transform: translateY(0);
            box-shadow: 0 5px 0 #e55a1e;
        }
        
        .btn-next i {
            margin-left: 15px;
        }
        
        /* Pantalla final */
        .end-screen {
            display: none;
            background: linear-gradient(145deg, #ffda79, #ffb347);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border: 10px solid #ffb347;
            position: relative;
            overflow: hidden;
        }
        
        .end-screen::before {
            content: "";
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background-color: #a5deff;
            border-radius: 50%;
        }
        
        .end-title {
            font-size: 3.5rem;
            color: #ff7b3d;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0 white;
            position: relative;
            z-index: 2;
        }
        
        .final-score {
            font-size: 5rem;
            color: #6ecbf5;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0 white;
            position: relative;
            z-index: 2;
        }
        
        .score-message {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 50px;
            position: relative;
            z-index: 2;
        }
        
        .btn-restart {
            background: linear-gradient(145deg, #4cd964, #5de673);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 0 #2ecc71;
            position: relative;
            z-index: 2;
        }
        
        .btn-restart:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #2ecc71;
        }
        
        /* Estilos para confeti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 9999;
            pointer-events: none;
        }
        
        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1.8rem;
            }
            
            .option {
                font-size: 1.6rem;
                min-height: 120px;
            }
            
            .start-title, .end-title {
                font-size: 2.8rem;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
            }
            
            .score-container, .question-counter {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .start-title, .end-title {
                font-size: 2.2rem;
            }
            
            .question-text {
                font-size: 1.6rem;
            }
            
            .option {
                font-size: 1.4rem;
                padding: 20px 10px;
                min-height: 100px;
            }
            
            .btn-start, .btn-next, .btn-restart {
                font-size: 1.6rem;
                padding: 20px 40px;
            }
            
            .feedback-text {
                font-size: 1.5rem;
            }
            
            .loading-content {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Overlay de carga -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loading-text">Comprobando respuesta...</div>
        </div>
    </div>
    
    <div class="container">
        <!-- Pantalla de inicio -->
        <div class="start-screen" id="start-screen">
            <h1 class="start-title">Programación Aventura</h1>
            <p class="start-subtitle">¡Aprende CSS Básico Divirtiéndote!</p>
            
            <div class="character">
                <i class="fas fa-laptop-code"></i>
            </div>
            
            <button class="btn-start" id="btn-start">
                <i class="fas fa-play-circle"></i> ¡EMPEZAR!
            </button>
        </div>
        
        <!-- Pantalla del juego -->
        <div class="game-screen" id="game-screen">
            <div class="header">
                <div class="score-container">
                    <div class="score-label">PUNTUACIÓN</div>
                    <div class="score-value" id="score">0</div>
                </div>
                
                <div class="question-counter">
                    <div class="counter-label">PREGUNTA</div>
                    <div class="counter-value" id="question-counter">1/10</div>
                </div>
            </div>
            
            <div class="question-card">
                <div class="question-number" id="question-number">1</div>
                <div class="question-text" id="question-text">¿Qué hace el selector *::after y *::before?</div>
            </div>
            
            <div class="options-container" id="options-container">
                <!-- Las opciones se generarán con JavaScript -->
            </div>
            
            <div class="feedback-container" id="feedback-container">
                <div class="feedback-title">
                    <div class="feedback-icon" id="feedback-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="feedback-text" id="feedback-text"></div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-next" id="btn-next">
                    Siguiente <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
        
        <!-- Pantalla final -->
        <div class="end-screen" id="end-screen">
            <h1 class="end-title">¡Juego Terminado!</h1>
            <div class="final-score" id="final-score">0/10</div>
            <p class="score-message" id="score-message">¡Excelente trabajo!</p>
            
            <button class="btn-restart" id="btn-restart">
                <i class="fas fa-redo"></i> Jugar de nuevo
            </button>
        </div>
    </div>

    <script>
        let score = 0;
        let currentQuestionIndex = 0;
        let selectedOption = null;
        
        const questions = [
            {
                question: "¿Qué hace 'margin: 0' en CSS?",
                options: [
                    "Cambia el color a cero",
                    "Elimina todo el espacio exterior del elemento",
                    "Hace el elemento invisible",
                    "Aumenta el tamaño del elemento"
                ],
                correct: 1,
                explanation: "¡Genial! ⭐ margin: 0 elimina TODO el espacio exterior, ¡como quitar el marco alrededor de una foto!"
            },
            {
                question: "¿Qué hace 'padding: 0' en CSS?",
                options: [
                    "Elimina todo el espacio interior del elemento",
                    "Cambia el color de fondo",
                    "Hace el texto más grande",
                    "Agrega bordes al elemento"
                ],
                correct: 0,
                explanation: "¡Perfecto! 📦 padding: 0 elimina TODO el espacio interior, ¡como quitar el relleno de un cojín!"
            },
            {
                question: "¿Para qué sirve 'background-color' en CSS?",
                options: [
                    "Para cambiar el tamaño",
                    "Para añadir una imagen",
                    "Para cambiar el color del texto",
                    "Para cambiar el color de fondo de un elemento"
                ],
                correct: 3,
                explanation: "¡Muy bien! 🎨 background-color cambia el color de fondo, ¡en este código se usa var(--dark-color) que es negro!"
            },
            {
                question: "¿Qué hace 'display: flex' en CSS?",
                options: [
                    "Cambia el color del elemento",
                    "Organiza elementos de forma flexible",
                    "Hace el elemento más pequeño",
                    "Elimina el elemento"
                ],
                correct: 1,
                explanation: "¡Excelente! 🎯 display: flex organiza elementos de forma flexible, ¡en este código ayuda a centrar el contenido!"
            },
            {
                question: "¿Qué significa 'min-height: 100vh'?",
                options: [
                    "Hace el elemento muy pequeño",
                    "Cambia el color del elemento",
                    "Elimina la altura del elemento",
                    "Altura mínima igual a toda la pantalla"
                ],
                correct: 3,
                explanation: "¡Correcto! 📐 100vh significa el 100% de la altura de la ventana, ¡como llenar toda la pantalla de arriba a abajo!"
            },
            {
                question: "¿Para qué sirve 'overflow: hidden'?",
                options: [
                    "Para organizar elementos en filas",
                    "Para cortar lo que sobresale del elemento",
                    "Para cambiar el color",
                    "Para hacer elementos más grandes"
                ],
                correct: 1,
                explanation: "¡Súper! ✂️ overflow: hidden corta el contenido que se sale, ¡por eso en este código no aparecen barras de desplazamiento!"
            },
            {
                question: "¿Qué hace 'position: fixed' en CSS?",
                options: [
                    "Elimina el borde completamente",
                    "Mantiene el elemento fijo en la pantalla",
                    "Cambia el grosor del borde",
                    "Cambia el color del borde"
                ],
                correct: 1,
                explanation: "¡Genial! 📌 position: fixed mantiene el elemento fijo aunque hagas scroll, ¡como el elemento .night en este código!"
            },
            {
                question: "¿Qué hace 'transform: translateX(-50%)'?",
                options: [
                    "Cambia colores",
                    "Hace zoom",
                    "Mueve el elemento 50% a la izquierda",
                    "Esconde TODO el elemento"
                ],
                correct: 2,
                explanation: "¡Muy bien! ⬅️ translateX(-50%) mueve el elemento hacia la izquierda, ¡en este código ayuda a centrar el elemento .night!"
            },
            {
                question: "¿Para qué sirven las variables CSS como '--dark-color'?",
                options: [
                    "Para eliminar elementos",
                    "Para cambiar tamaños",
                    "Para hacer animaciones",
                    "Para guardar valores que se usan varias veces"
                ],
                correct: 3,
                explanation: "¡Fantástico! 💾 Las variables CSS guardan valores para usarlos muchas veces, ¡como tener un color favorito guardado!"
            },
            {
                question: "¿Qué hace 'filter: blur()' en CSS?",
                options: [
                    "Hace el texto más grande",
                    "Desenforma o hace borroso el elemento",
                    "Cambia el color del elemento",
                    "Elimina el elemento"
                ],
                correct: 1,
                explanation: "¡Excelente! 🌫️ filter: blur() hace borroso el elemento, ¡en este código se usa blur(0.1vmin) para el fondo nocturno!"
            }
        ];
        
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const btnStart = document.getElementById('btn-start');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');
        const scoreElement = document.getElementById('score');
        const questionCounterElement = document.getElementById('question-counter');
        const questionNumberElement = document.getElementById('question-number');
        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackText = document.getElementById('feedback-text');
        const finalScoreElement = document.getElementById('final-score');
        const scoreMessageElement = document.getElementById('score-message');
        
        btnStart.addEventListener('click', startGame);
        
        btnNext.addEventListener('click', nextQuestion);
        
        btnRestart.addEventListener('click', restartGame);
        
        function startGame() {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            loadQuestion();
        }
        
        function loadQuestion() {
            resetQuestion();
            
            const currentQuestion = questions[currentQuestionIndex];
            questionTextElement.textContent = currentQuestion.question;
            questionNumberElement.textContent = currentQuestionIndex + 1;
            questionCounterElement.textContent = `${currentQuestionIndex + 1}/${questions.length}`;
            
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.classList.add('option');
                
                const optionIcon = document.createElement('div');
                optionIcon.classList.add('option-icon');
                
                const icons = ['fas fa-star', 'fas fa-heart', 'fas fa-sun', 'fas fa-moon'];
                optionIcon.innerHTML = `<i class="${icons[index]}"></i>`;
                
                optionElement.appendChild(optionIcon);
                
                const optionText = document.createElement('div');
                optionText.textContent = option;
                optionElement.appendChild(optionText);
                
                optionElement.addEventListener('click', () => selectOption(index, optionElement));
                optionsContainer.appendChild(optionElement);
            });
            
            feedbackContainer.style.display = 'none';
            btnNext.disabled = true;
        }
        
        function selectOption(index, optionElement) {
            if (selectedOption !== null) return;
            
            selectedOption = index;
            
            optionElement.classList.add('selected');
            
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => {
                opt.style.pointerEvents = 'none';
            });
            
            showLoading();
            
            setTimeout(() => {
                checkAnswer(index, optionElement);
            }, 1500);
        }
        
        function showLoading() {
            const loadingMessages = [
                "Comprobando respuesta...",
                "Analizando tu elección...",
                "¡Un momento por favor!",
                "Procesando información..."
            ];
            
            const randomMessage = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
            loadingText.textContent = randomMessage;
            
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        function createConfetti() {
            const colors = ['#FF6B9D', '#FEC163', '#6BCF7F', '#4D96FF', '#9B59B6', '#FFD93D', '#ff7b3d'];
            const confettiCount = 50;
            
            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animation = `confetti-fall ${2 + Math.random() * 2}s linear forwards`;
                    confetti.style.animationDelay = Math.random() * 0.3 + 's';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 20);
            }
        }
        
        function checkAnswer(index, optionElement) {
            hideLoading();
            
            const correctIndex = questions[currentQuestionIndex].correct;
            const isCorrect = index === correctIndex;
            
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach((opt, i) => {
                if (i === correctIndex) {
                    opt.classList.add('correct');
                } else if (i === index && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });
            
            if (isCorrect) {
                score++;
                scoreElement.textContent = score;
                createConfetti();
            }
            
            setTimeout(() => {
                showFeedback(isCorrect);
            }, 300);
            
            setTimeout(() => {
                btnNext.disabled = false;
            }, 500);
        }
        
        function showFeedback(isCorrect) {
            const currentQuestion = questions[currentQuestionIndex];
            
            if (isCorrect) {
                feedbackIcon.className = 'feedback-icon correct';
                feedbackIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
                feedbackText.textContent = currentQuestion.explanation;
            } else {
                feedbackIcon.className = 'feedback-icon incorrect';
                feedbackIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                
                const correctAnswer = currentQuestion.options[currentQuestion.correct];
                feedbackText.textContent = `${currentQuestion.explanation} La respuesta correcta era: "${correctAnswer}"`;
            }
            
            feedbackContainer.style.display = 'block';
        }
        
        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }
        
        function endGame() {
            gameScreen.style.display = 'none';
            endScreen.style.display = 'block';
            
            finalScoreElement.textContent = `${score}/${questions.length}`;
            
            if (score === questions.length) {
                scoreMessageElement.textContent = "¡PERFECTO! 🏆 Eres un experto en CSS Básico";
                createConfetti();
            } else if (score >= questions.length * 0.7) {
                scoreMessageElement.textContent = "¡MUY BIEN! 🌟 Dominas CSS muy bien";
            } else if (score >= questions.length * 0.5) {
                scoreMessageElement.textContent = "¡BUEN TRABAJO! 👍 Sigue aprendiendo";
            } else {
                scoreMessageElement.textContent = "¡SIGUE PRACTICANDO! 💪 Aprenderás mucho más";
            }
        }
        
        function restartGame() {
            score = 0;
            currentQuestionIndex = 0;
            selectedOption = null;
            
            scoreElement.textContent = score;
            
            endScreen.style.display = 'none';
            startScreen.style.display = 'block';
        }
        
        function resetQuestion() {
            selectedOption = null;
        }
    </script>
</body>
</html>
